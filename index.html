<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep</title>
    <link rel="icon" href="resources/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>

    <nav>
        <!--0 child-->
        <section class="nav-left">
            <img src="resources/icons/menu.svg" alt="menu" class="nav-icon">
            <img src="resources/logo.svg" alt="logo" class="keep-logo">
            <h1 id="logo">Keep</h1>

            <div class="search-box">
                <img id="search-icon" src="resources/icons/search.svg" alt="search">
                <input type="search" id="search" placeholder="Search">
            </div>
        </section>

        <!--1 child-->
        <section class="nav-right">
            <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle dark mode">
                <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
            </button>
            <span class="material-symbols-outlined">
                refresh
            </span>
            <span class="material-symbols-outlined">
                settings
            </span>
            <span class="material-symbols-outlined">
                apps
            </span>
            <span class="material-symbols-outlined">
                account_circle
            </span>
        </section>


    </nav>

    <aside>
        <a href="#" class="side-button active">
            <img src="resources/icons/lightbulb.svg" alt="Notes">
            <span class="side-text">Notes</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/add_alert.svg" alt="Reminders">
            <span class="side-text">Reminders</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/label.svg" alt="Label">
            <span class="side-text">Inspiration</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/label.svg" alt="Label">
            <span class="side-text">Other</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/label.svg" alt="Label">
            <span class="side-text">Personal</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/label.svg" alt="Label">
            <span class="side-text">Work</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/edit.svg" alt="Edit">
            <span class="side-text">Edit labels</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/archive.svg" alt="Archive">
            <span class="side-text">Archive</span>
        </a>

        <a href="#" class="side-button">
            <img src="resources/icons/delete.svg" alt="Trash">
            <span class="side-text">Trash</span>
        </a>

    </aside>


    <main>

       <section class="note-creator collapsed">
           <input type="text" id="title" placeholder="Title" />
           <textarea id="note" placeholder="Take a note..."></textarea>
           <div class="note-actions">
               <button id="close-note">Close</button>
           </div>

           <!-- Color Picker Icon -->
           <div class="color-picker">
               <button class="palette-button" id="palette-toggle" type="button" aria-label="Choose background color">
                   <span class="material-symbols-outlined" aria-hidden="true">palette</span>
               </button>
               <div class="color-popover" id="color-popover" aria-hidden="true">
                   <input type="color" id="background-color" aria-label="Background color" />
               </div>
           </div>
       </section>
       
       <section id="note-list" class="note-list"></section>

    </main>



    

    <script src="index.js" type="text/javascript"></script>
</body>
</html>
